<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>業務用エアコン無料見積もりLP | ProCool Air Design</title>

<style>
:root {
  --bg: #f6f9ff;
  --text: #16233b;
  --muted: #55627a;
  --line: #dbe6f5;
  --card: #ffffff;
  --primary: #ff7a00;
  --primary-dark: #dc6200;
  --sub: #0c66ff;
}

body {
  margin: 0;
  font-family: "Noto Sans JP", sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.8;
}

.container {
  width: min(1100px, 92vw);
  margin: auto;
}

header {
  position: sticky;
  top: 0;
  background: #fff;
  border-bottom: 1px solid var(--line);
}

nav {
  display: flex;
  justify-content: space-between;
  padding: 14px 0;
}

.logo span {
  color: var(--sub);
}

.hero {
  padding: 80px 0;
}

h1 {
  font-size: 2.5rem;
}

.btn {
  background: var(--primary);
  color: #fff;
  padding: 14px 24px;
  border-radius: 999px;
  text-decoration: none;
  display: inline-block;
  font-weight: bold;
}

.card {
  background: #fff;
  padding: 20px;
  border-radius: 12px;
  border: 1px solid var(--line);
}

.grid-3 {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 20px;
}

section {
  padding: 60px 0;
}

.price {
  font-size: 1.6rem;
  color: var(--sub);
  font-weight: bold;
}

footer {
  text-align: center;
  padding: 30px;
  border-top: 1px solid var(--line);
}

@media(max-width:900px){
  .grid-3{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<header>
  <div class="container">
    <nav>
      <div class="logo">ProCool <span>Air Design</span></div>
      <div>
        <a href="#form">見積もり</a>
      </div>
    </nav>
  </div>
</header>

<section class="hero">
  <div class="container">
    <h1>電気代最大35%削減。最短7日導入。</h1>
    <p>500件以上の施工実績で最適な空調設計をご提案。</p>
    <a href="#form" class="btn">無料見積もり</a>
  </div>
</section>

<section>
  <div class="container grid-3">
    <div class="card">
      <h3>電気代が高い</h3>
      <p>無駄な電力消費を削減</p>
    </div>
    <div class="card">
      <h3>効きムラ</h3>
      <p>空調設計で改善</p>
    </div>
    <div class="card">
      <h3>故障リスク</h3>
      <p>保守で回避</p>
    </div>
  </div>
</section>

<section>
  <div class="container grid-3">
    <div class="card">
      <h3>Compact</h3>
      <p class="price">¥398,000〜</p>
    </div>
    <div class="card">
      <h3>Business</h3>
      <p class="price">¥780,000〜</p>
    </div>
    <div class="card">
      <h3>Premium</h3>
      <p class="price">¥1,280,000〜</p>
    </div>
  </div>
</section>

<section id="form">
  <div class="container">
    <h2>無料見積もり</h2>
    <form>
      <input type="text" placeholder="名前" required><br><br>
      <input type="tel" placeholder="電話番号" required><br><br>
      <textarea placeholder="内容"></textarea><br><br>
      <button class="btn">送信する</button>
    </form>
  </div>
</section>

<footer>
© 2026 ProCool Air Design
</footer>

</body>
</html>
