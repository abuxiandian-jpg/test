<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>業務用エアコンLP</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #0a1a2f;
  color: #fff;
}

.container {
  width: 90%;
  max-width: 1100px;
  margin: auto;
}

h1,h2,h3 {
  margin: 0 0 10px;
}

section {
  padding: 60px 0;
}

.hero {
  text-align: center;
}

.cta {
  background: orange;
  color: #fff;
  padding: 15px 30px;
  border-radius: 30px;
  display: inline-block;
  margin-top: 20px;
  text-decoration: none;
}

.grid {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
}

.card {
  background: #13294b;
  padding: 20px;
  border-radius: 10px;
  flex: 1;
}

form input, form textarea {
  width: 100%;
  margin-bottom: 10px;
  padding: 10px;
}
</style>
</head>

<body>

<section class="hero">
  <div class="container">
    <h1>電気代最大35%削減。最短7日導入。</h1>
    <p>500件以上の施工実績</p>
    <a href="#" class="cta">無料見積もり</a>
  </div>
</section>

<section>
  <div class="container grid">
    <div class="card">電気代が高い</div>
    <div class="card">効きムラ</div>
    <div class="card">故障リスク</div>
  </div>
</section>

<section>
  <div class="container grid">
    <div class="card">¥398,000〜</div>
    <div class="card">¥780,000〜</div>
    <div class="card">¥1,280,000〜</div>
  </div>
</section>

<section>
  <div class="container">
    <h2>無料見積もり</h2>
    <form>
      <input type="text" placeholder="名前">
      <input type="text" placeholder="電話番号">
      <textarea placeholder="内容"></textarea>
      <button class="cta">送信</button>
    </form>
  </div>
</section>

</body>
</html>
